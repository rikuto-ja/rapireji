<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>レジ操作 | らぴレジ</title>
    <style>
        :root {
            --black: #000000; --white: #ffffff; --gray-bg: #f8f9fa;
            --gray-light: #e9ecef; --accent: #00ff00; --header-h: 60px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }
        body { background-color: var(--white); overflow: hidden; display: flex; flex-direction: column; height: 100vh; height:-webkit-fill-available; width: 100vw; }
        
        html{height: -webkit-fill-available;}

        header {
            height: calc(var(--header-h) + env(safe-area-inset-top)); 
            border-bottom: 3px solid var(--black);
            display: flex; 
            align-items: center; 
            padding: env(safe-area-inset-top) 20px 0 20px; 
            background: var(--white);
            position: sticky; 
            top: 0; 
            z-index: 1100;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; }
        header h1 { font-size: 1.2rem; font-weight: 900; margin-left: 20px; white-space: nowrap; }
        .header-ad-space { flex: 1; margin-left: 20px; height: 45px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed #ccc; }

        .menu-trigger { width: 30px; height: 22px; cursor: pointer; position: relative; }
        .menu-trigger span { display: block; width: 100%; height: 4px; background: var(--black); position: absolute; left: 0; transition: all 0.3s; }
        .menu-trigger span:nth-child(1) { top: 0; }
        .menu-trigger span:nth-child(2) { top: 9px; }
        .menu-trigger span:nth-child(3) { top: 18px; }
        .menu-trigger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; }
        .menu-trigger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
        .menu-link.active { background-color: transparent; color: var(--black); font-weight: 900; font-size: 1.1rem; border-left: 8px solid var(--black); padding-left: 7px; }
        
        .side-nav { 
            position: fixed; 
            top: var(--header-h); 
            left: 0; 
            width: 250px; 
            height: calc(100% - var(--header-h)); 
            padding-bottom: env(safe-area-inset-bottom); 
            background: var(--white); 
            border-right: 3px solid var(--black); 
            z-index: 1050; 
            transition: transform 0.3s; 
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 20px;
        }
        .side-nav.hidden { transform: translateX(-100%); }
        .menu-link { display: block; padding: 15px; color: var(--black); font-weight: 800; text-decoration: none; border-bottom: 1px solid var(--gray-light); }

        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; margin-bottom:0; }
        .product-section { flex: 7.5; display: flex; flex-direction: column; background: var(--gray-bg); padding: 10px; overflow: visible; }
        .category-bar { 
            display: flex; gap: 8px; margin-bottom: 10px; overflow: visible; padding: 2px; flex-shrink: 0; 
            position: relative; align-items: center; min-height: 50px; 
        }
        .cat-tab { padding: 8px 16px; background: var(--white); border: 2px solid var(--black); font-weight: 800; font-size: 0.8rem; cursor: pointer; white-space: nowrap; box-shadow: 2px 2px 0px var(--black); border-radius: 0; }
        .cat-tab.active { background: var(--black); color: var(--white); transform: translate(1px, 1px); box-shadow: none; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            grid-auto-rows: min-content; 
            gap: 8px; 
            overflow-y: auto; 
            align-content: start; 
            flex: 1; 
        }
        
        .product-card { 
            height: auto; 
            min-height: 110px; 
            background: var(--white); 
            border: 2px solid var(--black); 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            box-shadow: 2px 2px 0px var(--black); 
            position: relative; 
            overflow: visible; 
        }
        .product-card:active { transform: translate(1px, 1px); box-shadow: none; }
        .product-card.out-of-stock { opacity: 0.5; cursor: not-allowed; background: #eee; }
        .out-of-stock-label { position: absolute; top: 20px; left: 50%; transform: translate(-50%, -50%); background: red; color: white; padding: 2px 5px; font-size: 0.7rem; font-weight: 900; z-index: 10; pointer-events: none; }

        .empty-slot { height: 110px; border: 1px solid transparent; }
        
        .p-img { width: 100%; height: 55px; object-fit: cover; border-bottom: 1px solid var(--black); flex-shrink: 0; }
        
        .p-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            font-weight: 800; 
            font-size: 0.7rem; 
            padding: 6px 2px; 
            text-align: center; 
            line-height: 1.2; 
        }
        .p-info strong { 
            display: block; 
            word-break: break-all; 
            margin-bottom: 4px;
            width: 100%;
        }
        .p-price { display: block; margin-top: auto; padding-top: 2px; }
        .p-stock { font-size: 0.6rem; color: #666; margin-top: 1px; }
        .stock-alert { color: #ff0000 !important; font-weight: 900 !important; }

        .cart-section { flex: 2.5; border-left: 3px solid var(--black); display: flex; flex-direction: column; background: var(--white); overflow: hidden; }
        .drag-handle { padding: 10px 10px; border-bottom: 2px solid var(--black); font-weight: 900; background: #eee; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; }
        .handle-bar { display: none; width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin-bottom: 5px; }

        .cart-list { flex: 1; overflow-y: auto; padding: 10px; }
        .cart-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid #000; font-weight: 800; font-size: 0.85rem; }
        .cart-item-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 28px; height: 28px; background: #fff; border: 2px solid #000; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0; }
        
        .cart-total { padding: 15px; border-top: calc(15px+env(safe-area-inset-bottom)); border-top: 3px solid var(--black); background: var(--white); flex-shrink: 0; z-index: 100; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 900; margin-bottom: 10px; }
        .checkout-btn { width: 100%; background: var(--black); color: var(--white); border: none; padding: 15px; font-size: 1.1rem; font-weight: 900; cursor: pointer; border-radius: 0; }

        .confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 30000; }
        .confirm-content { background: #fff; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 #000; }
        .hidden { display: none !important; }

        /* 検索バーのレイアウト調整 */
        .search-btn { 
            background: none; border: none; font-size: 1.2rem; cursor: pointer; 
            flex-shrink: 0; padding: 0 10px; box-shadow: none; /* 影を消去 */
        }
        /* クリック時の挙動も無効化 */
        .search-btn:active { transform: none; }
        .search-container { 
            display: none; position: absolute; left: 45px; right: 0; top: 0; bottom: -5px; 
            background: var(--gray-bg); z-index: 100; align-items: center; gap: 5px;
        }
        .search-container.open { display: flex; }
        .search-input { 
            flex: 1; height: 35px; border: 2px solid var(--black); padding: 0 10px; 
            font-weight: 800; font-size: 0.9rem; outline: none;
        }
        .search-close { cursor: pointer; font-weight: 900; padding: 0 10px; }

        /* 検索候補リスト */
        .search-results {
            position: absolute; top: 40px; left: 45px; right: 0; 
            background: white; border: 2px solid var(--black); 
            z-index: 2000; max-height: 200px; overflow-y: auto; box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .search-result-item {
            padding: 10px; border-bottom: 1px solid var(--gray-light); 
            cursor: pointer; font-weight: 800; font-size: 0.85rem;
        }
        .search-result-item:hover { background: var(--gray-light); }

        @media screen and (max-width: 768px) {
            header { padding: 0 10px; }
            header h1 { font-size: 0.9rem; margin-left: 10px; }
            .header-ad-space { margin-left: 10px; height: 35px; min-width: 80px; font-size: 8px; }
            .main-layout { flex-direction: column; }
            .product-section { flex: none; height: 45vh; }
            .product-grid { grid-template-columns: repeat(4, 1fr); }
            .product-card { min-height: 95px; height: auto; }
            .p-img { height: 40px; } 
            .p-info { padding: 4px 2px; }
            .empty-slot { height: 95px; border:1px solid transparent; display: block; }
            .cart-section { flex: 1; border-left: none; border-top: 3px solid var(--black); }
            .drag-handle { cursor: row-resize; touch-action: none; padding: 5px 10px 10px 10px; }
            .handle-bar { display: block; }
            .total-row { font-size: 1.1rem; }
            .checkout-btn { padding: 12px; font-size: 1rem; }
        }

        #categoryTabs {
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 5px 0;    /* ボタンの影が切れないように上下パディング */
            scrollbar-width: none; /* Firefox用：スクロールバーを隠す */
        }

        #categoryTabs::-webkit-scrollbar {
            display: none; /* Chrome, Safari用：スクロールバーを隠す */
        }

        /* 追加：オフラインバッジのスタイル */
        .offline-badge {
            display: none;
            font-size: 0.7rem;
            background: var(--accent);
            color: var(--black);
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
            border: 1px solid var(--black);
            animation: fadeIn 0.5s;
            white-space: nowrap;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="reg-sound" src="beep1.mp3" preload="auto"></audio>

<header>
    <div class="header-left">
        <div class="menu-trigger" id="menu-btn"><span></span><span></span><span></span></div>
        <h1>らぴレジ<span id="offline-status" class="offline-badge">￥</span></h1>
    </div>
    <div class="header-ad-space" id="ad-top">
        <span style="color:#ccc; font-size: 8px; font-weight: 900;">AD</span>
    </div>
</header>

<nav class="side-nav hidden" id="side-menu">
    <a href="register.html" class="menu-link">レジ操作</a>
    <a href="product.html" class="menu-link">商品管理</a>
    <a href="stock.html" class="menu-link">在庫管理</a>
    <a href="history.html" class="menu-link">販売履歴</a>
    <a href="settings.html" class="menu-link">設定</a>
</nav>

<div id="tagConfirmModal" class="confirm-modal hidden">
    <div class="confirm-content">
        <h2 id="tagTitle" style="margin-bottom: 10px; font-weight: 900;"></h2>
        <p id="tagDesc" style="margin-bottom: 25px; font-weight: 800; color: #ff0000; font-size: 1.3rem;"></p>
        <div style="display: flex; gap: 10px;">
            <button id="tag-ok" class="checkout-btn" style="flex:1; padding:12px;">確認</button>
            <button id="tag-cancel" style="flex:1; background:#fff; border:2px solid #000; font-weight:900; cursor:pointer;">戻る</button>
        </div>
    </div>
</div>

<main class="main-layout">
    <section class="product-section">
        <div class="category-bar">
            <button class="search-btn" id="openSearch">🔍</button>
            <div id="categoryTabs" style="display: flex; gap: 8px; overflow-x: auto;"></div>
    
            <div class="search-container" id="searchWrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="商品名・JANコード入力...">
                <span class="search-close" id="closeSearch">✕</span>
            </div>
            <div id="searchResults" class="search-results hidden"></div>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </section>

    <section class="cart-section">
        <div id="drag-handle" class="drag-handle">
            <div class="handle-bar"></div>
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                <span>注文リスト</span>
                <span onclick="goToScanFromRegister()" style="cursor: pointer; font-size: 0.9rem; color: var(--black)">📷</span>
            </div>
        </div>
        <div class="cart-list" id="cartList"></div>
        <div class="cart-total">
            <div class="total-row">
                <span>合計</span>
                <span id="totalAmount">¥0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">決済画面へ</button>
        </div>
    </section>
</main>

<script>
    const STORAGE_KEYS = {
        PRODUCTS: 'rapireji_products',
        CATEGORIES: 'rapireji_categories',
        STOCK_CONFIG: 'rapireji_stock_config'
    };

    let allProducts = [], cart = [], currentCategory = "", pendingItem = null;
    let isStockEnabled = false, alertThreshold = 0;
    let alertedStatus = {};

    function playRegisterSound() {
        // 設定を読み込む（未設定の場合はデフォルトでONにする）
        const sounds = JSON.parse(localStorage.getItem('rapireji_sounds') || '{"btn": true, "pay": true}');
        
        // 操作音（btn）がONの場合のみ再生
        if (sounds.btn) {
            const sound = document.getElementById('reg-sound');
            sound.currentTime = 0; 
            sound.play().catch(e => console.log("Sound play blocked"));
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        initDragResize();
        loadData();
        restoreCart();
    });

    function initDragResize() {
        const handle = document.getElementById('drag-handle');
        const productSection = document.querySelector('.product-section');
        let isDragging = false;
        const startDrag = (e) => {
            if (window.innerWidth > 768) return;
            isDragging = true;
            document.body.style.userSelect = 'none';
        };
        const doDrag = (e) => {
            if (!isDragging) return;
            const touchY = e.touches ? e.touches[0].clientY : e.clientY;
            const headerH = 60;
            let newHeight = touchY - headerH;
            if (newHeight < 50) newHeight = 50; 
            const minCartHeight = 150; 
            if (newHeight > window.innerHeight - headerH - minCartHeight) {
                newHeight = window.innerHeight - headerH - minCartHeight;
            }
            productSection.style.height = newHeight + 'px';
            e.preventDefault();
        };
        const stopDrag = () => {
            isDragging = false;
            document.body.style.userSelect = 'auto';
        };
        handle.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', doDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);
    }

    function loadData() {
        const config = JSON.parse(localStorage.getItem(STORAGE_KEYS.STOCK_CONFIG) || '{"enabled":false, "threshold":0}');
        isStockEnabled = config.enabled;
        alertThreshold = Number(config.threshold);
        const categories = JSON.parse(localStorage.getItem(STORAGE_KEYS.CATEGORIES) || '[]');
        const bar = document.getElementById('categoryTabs');
        bar.innerHTML = "";
        let firstCat = "";
        categories.forEach((cat, idx) => {
            if(idx === 0) firstCat = cat.name;
            const btn = document.createElement('button');
            btn.className = "cat-tab"; 
            btn.textContent = cat.name;
            btn.onclick = () => switchCategory(cat.name);
            bar.appendChild(btn);
        });
        allProducts = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        if (!currentCategory && firstCat) {
            switchCategory(firstCat);
        } else if (currentCategory) {
            switchCategory(currentCategory);
        } else {
            renderProducts();
        }
    }

    function switchCategory(name) {
        currentCategory = name;
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.textContent === name));
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        const filtered = allProducts.filter(p => p.category === currentCategory && p.isActive !== false);
        
        for (let i = 0; i < 50; i++) {
            const p = filtered.find(item => item.index === i);
            if (p) {
                const inCart = cart.find(c => c.id === p.id);
                const cartQty = inCart ? inCart.qty : 0;
                const displayStock = (Number(p.stock) || 0) - cartQty;
                const isOutOfStock = isStockEnabled && (displayStock <= 0);
                
                // 商品ごとの税込価格を計算（表示用）
                const taxRate = Number(p.taxRate || 0);
                const priceInclTax = Math.floor(Number(p.price) * (1 + taxRate / 100));

                const card = document.createElement('div');
                card.className = "product-card" + (isOutOfStock ? " out-of-stock" : "");
                card.innerHTML = `
                    ${isOutOfStock ? '<div class="out-of-stock-label">終了</div>' : ''}
                    <img src="${p.imageUrl || ''}" class="p-img" onerror="this.style.visibility='hidden'">
                    <div class="p-info">
                        <strong>${p.name}</strong>
                        <span class="p-price">¥${priceInclTax.toLocaleString()} <small style="font-size:0.5rem;">(税込)</small></span>
                        ${isStockEnabled ? `<span class="p-stock">残:${displayStock}</span>` : ""}
                    </div>`;
                card.onclick = () => { if(!isOutOfStock) { playRegisterSound(); handleProductClick(p); } };
                grid.appendChild(card);
            } else {
                grid.appendChild(Object.assign(document.createElement('div'), {className: "empty-slot"}));
            }
        }
    }

    function handleProductClick(p) {
        const inCart = cart.find(c => c.id === p.id);
        const currentQty = inCart ? inCart.qty : 0;
        if (isStockEnabled && (Number(p.stock) - currentQty) <= 0) return;
        if (p.tag) {
            pendingItem = p;
            document.getElementById('tagTitle').innerText = p.name;
            document.getElementById('tagDesc').innerText = p.tag;
            document.getElementById('tagConfirmModal').classList.remove('hidden');
        } else { 
            addToCart(p); 
        }
    }

    document.getElementById('tag-ok').onclick = () => { if(pendingItem) addToCart(pendingItem); closeTagModal(); };
    document.getElementById('tag-cancel').onclick = closeTagModal;
    function closeTagModal() { document.getElementById('tagConfirmModal').classList.add('hidden'); pendingItem = null; }

    // 在庫警告チェック共通関数
    function checkStockAlert(product, currentQty) {
        if (!isStockEnabled) return;
        const remaining = Number(product.stock) - currentQty;
        if (remaining < alertThreshold && remaining >= 0 && !alertedStatus[product.id]) {
            setTimeout(() => {
                window.alert(`【在庫警告】\n「${product.name}」の残数が設定値（${alertThreshold}個）未満になりました。\n（残り ${remaining} 個）`);
            }, 100);
            alertedStatus[product.id] = true;
        }
    }

    function addToCart(p) {
        const existing = cart.find(item => item.id === p.id);
        let nextQty = existing ? existing.qty + 1 : 1;
        if (isStockEnabled && nextQty > Number(p.stock)) {
            alert("在庫上限です");
            return;
        }
        if (existing) { 
            existing.qty = nextQty; 
        } else { 
            cart.push({ id: p.id, name: p.name, price: Number(p.price), qty: 1, taxRate: p.taxRate }); 
        }
        checkStockAlert(p, nextQty);
        updateCartUI(); 
        renderProducts();
    }

    function updateCartUI() {
        const list = document.getElementById('cartList'), totalDisp = document.getElementById('totalAmount');
        list.innerHTML = "";
        
        // 税率ごとの税抜合計額を保持するオブジェクト
        const subtotalByRate = {}; 
        let simpleVisualTotal = 0; 

        cart.forEach((item, index) => {
            const pInfo = allProducts.find(p => p.id === item.id);
            // 税率を取得（設定がない場合は0とする）
            const rate = pInfo ? Number(pInfo.taxRate || 0) : 0;
            const priceInclTax = Math.floor(item.price * (1 + rate / 100));
            const rowTotal = priceInclTax * item.qty;
            
            simpleVisualTotal += rowTotal;

            // 税率ごとのグループに税抜合計を加算
            if (!subtotalByRate[rate]) {
                subtotalByRate[rate] = 0;
            }
            subtotalByRate[rate] += (item.price * item.qty);

            const div = document.createElement('div');
            div.className = "cart-item";
            div.innerHTML = `
                <div class="cart-item-top">
                    <span>${item.name} <small>(${rate}%)</small></span>
                    <span>¥${rowTotal.toLocaleString()}</span>
                </div>
                <div class="cart-item-controls">
                    <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                    <span style="margin:0 10px;">× ${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                    <button onclick="removeItem(${index})" style="margin-left:auto; background:none; border:none; color:red; font-weight:bold; cursor:pointer;">削除</button>
                </div>`;
            list.appendChild(div);
        });

        // 最終計算
        let finalTaxTotal = 0;
        let finalSubtotal = 0;

        console.group("--- 決済計算詳細 (汎用税率対応) ---");
        
        Object.keys(subtotalByRate).forEach(rate => {
            const r = Number(rate);
            const subtotal = subtotalByRate[r];
            const tax = Math.floor(subtotal * (r / 100)); // 税率ごとの税金（切り捨て）
            
            finalSubtotal += subtotal;
            finalTaxTotal += tax;
            
            console.log(`税率 ${r}% 対象(税抜): ${subtotal}円 => 税額: ${tax}円`);
        });

        const finalTotal = finalSubtotal + finalTaxTotal;

        console.log(`表示用単純合計(参考): ${simpleVisualTotal}円`);
        console.log(`総合計(税抜計 ${finalSubtotal}円 + 税計 ${finalTaxTotal}円): ${finalTotal}円`);
        console.groupEnd();

        totalDisp.innerText = `¥${finalTotal.toLocaleString()}`;
        
        // セッションストレージに保存
        sessionStorage.setItem('currentOrder', JSON.stringify({ 
            items: cart, 
            totalAmount: finalTotal,
            taxDetails: subtotalByRate // 全税率の内訳を保持
        }));
        
        list.scrollTop = list.scrollHeight;
    }

    window.changeQty = (index, diff) => {
        playRegisterSound();
        const item = cart[index];
        const pInfo = allProducts.find(p => p.id === item.id);
        if (!pInfo) return;
        const newQty = item.qty + diff;
        if (isStockEnabled && diff > 0 && newQty > Number(pInfo.stock)) {
            alert("在庫上限です");
            return;
        }
        item.qty = newQty;
        if (item.qty <= 0) {
            delete alertedStatus[item.id];
            cart.splice(index, 1);
        } else if (diff > 0) {
            checkStockAlert(pInfo, item.qty);
        }
        updateCartUI();
        renderProducts();
    };

    window.removeItem = (index) => { 
        const item = cart[index];
        delete alertedStatus[item.id];
        cart.splice(index, 1); 
        updateCartUI(); 
        renderProducts();
    };

    function restoreCart() {
        const storedOrder = sessionStorage.getItem('currentOrder');
        if (storedOrder) {
            const orderData = JSON.parse(storedOrder);
            cart = orderData.items || [];
            updateCartUI();
            renderProducts();
        }
    }

    document.getElementById('checkoutBtn').onclick = () => { 
        if (cart.length === 0) return alert("カートが空です"); 
        playRegisterSound();
        setTimeout(() => {
            location.href = 'payment.html'; 
        }, 150);
    };
    
    const menuBtn = document.getElementById('menu-btn');
    const sideMenu = document.getElementById('side-menu');

    menuBtn.onclick = () => { 
        menuBtn.classList.toggle('open'); 
        sideMenu.classList.toggle('hidden'); 
    };

    // --- 現在のページをメニューで強調表示する処理 ---
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname.split("/").pop();
        const menuLinks = document.querySelectorAll('.menu-link');

        menuLinks.forEach(link => {
            const linkPath = link.getAttribute('href');
            // 現在のファイル名と href が一致したら 'active' クラスをつける
            if (currentPath === linkPath) {
                link.classList.add('active');
            }
        });
    });

    function goToScanFromRegister() {
        // 現在のカート状態（中身、合計金額、税計算すべて）をそのまま保持して移動
        const orderData = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
        sessionStorage.setItem('currentOrder', JSON.stringify(orderData));
        location.href = 'scan.html?mode=reg'; 
    }

    // スキャン画面から「戻る」で帰ってきた際や、タブがアクティブになった時に最新のカートを反映する
    window.addEventListener('pageshow', (event) => {
        // ページがキャッシュから読み込まれた（戻るボタンなど）場合でも実行
        restoreCart();
    });
    
    // --- 検索機能のロジック ---
    const openSearch = document.getElementById('openSearch');
    const closeSearch = document.getElementById('closeSearch');
    const searchWrapper = document.getElementById('searchWrapper');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    openSearch.onclick = () => {
        searchWrapper.classList.add('open');
        searchInput.focus();
        };

    closeSearch.onclick = () => {
        searchWrapper.classList.remove('open');
        searchResults.classList.add('hidden');
        searchInput.value = "";
        };

    searchInput.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        if (!val) {
            searchResults.classList.add('hidden');
            return;
        }

        // 全商品から検索（名前またはJAN）
        const matches = allProducts.filter(p => 
            (p.name && p.name.toLowerCase().includes(val)) || 
            (p.jan && p.jan.includes(val))
        ).slice(0, 10); // 上位10件表示

        if (matches.length > 0) {
            searchResults.innerHTML = matches.map(p => `
                <div class="search-result-item" onclick="jumpToProduct('${p.category}', ${p.index})">
                    ${p.name} <small style="color:#666;">(${p.category})</small>
                </div>
            `).join('');
            searchResults.classList.remove('hidden');
        } else {
            searchResults.classList.add('hidden');
        }
    };  

    // 該当商品へジャンプする関数
    window.jumpToProduct = (catName, index) => {
        // 1. カテゴリを切り替え
        switchCategory(catName);
        
        // 2. 検索窓を閉じる
        closeSearch.onclick();

        // 3. 描画を待ってからスクロール
        setTimeout(() => {
            const grid = document.getElementById('productGrid');
            const cards = grid.querySelectorAll('.product-card, .empty-slot');
            if (cards[index]) {
                cards[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 強調演出（一瞬光らせる）
                cards[index].style.outline = "4px solid var(--accent)";
                setTimeout(() => cards[index].style.outline = "none", 1500);
            }
        }, 100);
    };

    // Service Workerの登録（修正版）
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => {
                console.log('らぴレジ: オフライン準備完了', reg.scope);
                // 追加：準備ができたらバッジを表示
                if (reg.active) {
                    document.getElementById('offline-status').style.display = 'inline-block';
                }
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'activated') {
                            document.getElementById('offline-status').style.display = 'inline-block';
                        }
                    };
                };
            })
            .catch(err => {
                console.error('らぴレジ: サービスワーカー登録失敗', err);
            });
        });
    }

</script>
</body>
</html>
