<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スキャン | らぴレジ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --black: #000000; --white: #ffffff; --accent: #00ff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--black); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* スキャン画面のヘッダー */
        header {
            height: 60px; padding-top: env(safe-area-inset-top);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 20px; background: var(--white); color: var(--black);
            border-bottom: 3px solid var(--black);
        }
        .mode-badge { background: var(--black); color: var(--white); padding: 4px 8px; font-weight: 900; font-size: 0.8rem; }

        /* カメラ表示エリア */
        #interactive.viewport {
            flex: 1; position: relative; overflow: hidden; width: 100%;
        }
        #interactive.viewport video {
            width: 100%; height: 100%; object-fit: cover;
        }
        
        /* 読み取りガイドの枠 */
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 30%; border: 2px solid var(--accent);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .scan-overlay::after {
            content: "バーコードを枠内に合わせてください";
            position: absolute; bottom: -40px; left: 0; width: 100%;
            text-align: center; color: var(--accent); font-weight: bold; font-size: 0.8rem;
        }

        /* 下部リザルトエリア */
        /* --- 変更点：下部パネルの高さとカートアイテム用スタイル --- */
        .result-panel {
            height: 160px; /* 少し高さを広げる */
            background: var(--white); color: var(--black);
            padding: 10px; border-top: 3px solid var(--black);
            display: flex; flex-direction: column;
        }   

        /* register.htmlから踏襲したスタイル */
        .cart-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid #000; font-weight: 800; font-size: 0.85rem; width: 100%; }
        .cart-item-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 32px; height: 32px; background: #fff; border: 2px solid #000; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #last-code { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .back-btn {
            width: 100%; background: var(--black); color: var(--white);
            border: none; padding: 12px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;" onclick="history.back()">← 戻る</div>
    <div id="mode-label" class="mode-badge">読み込み中...</div>
</header>

<div id="interactive" class="viewport">
    <div class="scan-overlay"></div>
</div>

<div class="result-panel">
    <div id="scanned-item-area" style="flex: 1; overflow-y: auto;">
        <div style="text-align: center; color: #999; margin-top: 20px;">バーコードを読み取ってください</div>
    </div>
    <button class="back-btn" onclick="history.back()" style="margin-top: 5px;">レジに戻る</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode'); // 'reg' (注文リスト追加), 'add' (JANコード1回登録)
const STORAGE_KEYS = { PRODUCTS: 'rapireji_products' };
let isPaused = false;

// UIの初期化
const modeLabel = document.getElementById('mode-label');
const backBtn = document.querySelector('.back-btn');

if (mode === 'reg') {
    modeLabel.innerText = "注文スキャンモード";
    backBtn.innerText = "レジに戻る";
} else {
    modeLabel.innerText = "JAN登録モード";
    backBtn.innerText = "商品登録に戻る";
}

// スキャン音のインスタンスを固定
const scanAudio3 = new Audio('beep3.mp3');
const scanAudio4 = new Audio('beep4.mp3'); // 未登録用

// ブラウザの音声ブロックを解除するためのフラグ
let audioUnlocked = false;

/* --- 修正：変数の整合性を合わせる --- */
document.addEventListener('touchstart', () => {
    if (!audioUnlocked) {
        // 変数名を beep1 に統一
        const b1 = new Audio('beep1.mp3'); 
        [scanAudio3, scanAudio4, b1].forEach(audio => {
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(() => {});
        });
        audioUnlocked = true;
    }
}, { once: true });

// 引数でファイル名を指定できるように修正
/* --- 変更点：playBeep関数を修正してbeep2に対応 --- */
function playBeep(type = 'beep3') {
    const sounds = JSON.parse(localStorage.getItem('rapireji_sounds')) || {btn: true, pay: true, scan: true, error: true};

    // 音色と設定項目の紐付け
    if (type === 'beep4') {
        if (sounds.error === false) return; 
    } else if (type === 'beep1') {
        if (sounds.btn === false) return;   // 数量変更（ボタン）はbtn設定を参照
    } else {
        if (sounds.scan === false) return; 
    }

    // 音源の準備（beep2が未定義なら作成）
    let targetAudio;
    if (type === 'beep4') targetAudio = scanAudio4;
    else if (type === 'beep3') targetAudio = scanAudio3;
    else {
        // beep2用のAudioオブジェクトを即時生成（一度生成すればブラウザがキャッシュします）
        targetAudio = new Audio('beep1.mp3');
    }

    targetAudio.currentTime = 0;
    targetAudio.play().catch(e => console.warn("音声再生に失敗:", e));
}

// ポップアップ表示（トースト）
function showPopup(message, isError = false) {
    const popup = document.createElement('div');
    popup.style = `
        position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'red' : 'rgba(0,255,0,0.9)'}; color: ${isError ? 'white' : 'black'};
        padding: 12px 24px; border-radius: 8px; font-weight: bold; z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: opacity 0.5s;
    `;
    popup.innerText = message;
    document.body.appendChild(popup);
    setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
    }, 1500);
}

// Quagga初期化
Quagga.init({
    inputStream: {
        name: "Live", type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: { facingMode: "environment", aspectRatio: { min: 1, max: 2 } },
    },
    decoder: { readers: ["ean_reader", "ean_8_reader"] }
}, function(err) {
    if (err) { console.error(err); return; }
    Quagga.start();
});

Quagga.onDetected((data) => {
    if (isPaused) return;
    const code = data.codeResult.code;
    isPaused = true;
    
    handleScannedCode(code);
});

/* --- 変更点：スキャン後の処理とUI更新 --- */
async function handleScannedCode(code) {
    // document.getElementById('last-code').innerText = code; // この行は削除（またはID変更）

    if (mode === 'reg') {
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => (String(p.jan) === String(code) || String(p.id) === String(code)));

        if (product) {
            playBeep('beep3');
            let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
            let existing = currentOrder.items.find(item => item.id === product.id);

            if (existing) {
                existing.qty++;
            } else {
                existing = { id: product.id, name: product.name, price: Number(product.price), qty: 1 };
                currentOrder.items.push(existing);
            }
            
            sessionStorage.setItem('currentOrder', JSON.stringify(currentOrder));
            // 直前の商品のみを表示
            updateScannedUI(existing, product);
        } else {
            playBeep('beep4');
            showPopup(`未登録の商品です (${code})`, true);
        }
        
        // スキャン後、少し間を置いてから次を許可（連続読み取り防止）
        setTimeout(() => { isPaused = false; }, 1500);

    } else {
        // JAN登録モード（変更なし）
        playBeep('beep3');
        localStorage.setItem('last_scanned_barcode', code);
        showPopup(`コード保存: ${code}`);
        setTimeout(() => history.back(), 1000);
    }
}

// 直前に読み込んだ商品1件のUIを描画する関数
function updateScannedUI(item, originalProduct) {
    const area = document.getElementById('scanned-item-area');
    const taxRate = Number(originalProduct.taxRate || 0);
    const priceInclTax = Math.floor(item.price * (1 + taxRate / 100));
    const rowTotal = priceInclTax * item.qty;

    area.innerHTML = `
        <div class="cart-item">
            <div class="cart-item-top">
                <span>${item.name} <small>(${taxRate}%)</small></span>
                <span>¥${rowTotal.toLocaleString()}</span>
            </div>
            <div class="cart-item-controls">
                <button class="qty-btn" onclick="changeQtyScan('${item.id}', -1)">-</button>
                <span style="margin:0 10px; font-size:1.2rem;">× ${item.qty}</span>
                <button class="qty-btn" onclick="changeQtyScan('${item.id}', 1)">+</button>
                <button onclick="removeItemScan('${item.id}')" style="margin-left:auto; background:none; border:none; color:red; font-weight:bold; cursor:pointer;">削除</button>
            </div>
        </div>
    `;
}

// スキャン画面用の数量変更関数
window.changeQtyScan = (id, diff) => {
    if (typeof playBeep === 'function') playBeep('beep1'); // 数量変更の音（必要に応じて追加）
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    const item = currentOrder.items.find(i => i.id === id);
    const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
    const product = products.find(p => p.id === id);

    if (item && product) {
        item.qty += diff;
        if (item.qty <= 0) {
            removeItemScan(id);
            return;
        }
        sessionStorage.setItem('currentOrder', JSON.stringify(currentOrder));
        updateScannedUI(item, product);
    }
};

// スキャン画面用の削除関数
window.removeItemScan = (id) => {
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    currentOrder.items = currentOrder.items.filter(i => i.id !== id);
    sessionStorage.setItem('currentOrder', JSON.stringify(currentOrder));
    document.getElementById('scanned-item-area').innerHTML = '<div style="text-align: center; color: #999; margin-top: 20px;">削除しました。スキャンを続けてください</div>';
};
</script>
</body>
</html>
