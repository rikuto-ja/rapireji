<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スキャン | らぴレジ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        /* --- 以下の内容に差し替え --- */
        :root { 
            --black: #000000; --white: #ffffff; --accent: #00ff00; 
            --header-h: 60px; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }

        body { background: var(--white); color: var(--black); height: 100svh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            height: calc(var(--header-h) + env(safe-area-inset-top)); 
            border-bottom: 3px solid var(--black);
            display: flex; 
            align-items: center; 
            padding: env(safe-area-inset-top) 20px 0 20px; 
            background: var(--white);
            color: var(--black);
            position: sticky; 
            top: 0; 
            z-index: 1100;
            justify-content: space-between;
        }

        /* 戻るボタン：お支払い画面の四角い枠線を移植 */
        .header-left { display: flex; align-items: center; }
        .btn-back { 
            background: var(--white); border: 2px solid var(--black); 
            padding: 8px 15px; font-weight: 900; cursor: pointer; 
            margin-right: 15px; font-size: 0.9rem; color: var(--black);
        }

        /* 広告スペース：お支払い画面と同じ設計 */
        .header-ad-space {
            flex: 1; margin-left: 10px; height: 40px; background: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px dashed #ccc;
        }
    
        .mode-badge { background: var(--black); color: var(--white); padding: 4px 8px; font-weight: 900; font-size: 0.8rem; }

        /* カメラ表示エリア */
        #interactive.viewport {
            flex: 1; position: relative; overflow: hidden; width: 100%;
        }
        #interactive.viewport video {
            width: 100%; height: 100%; object-fit: cover;
        }
        
        /* 読み取りガイドの枠 */
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 30%; border: 2px solid var(--accent);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .scan-overlay::after {
            content: "バーコードを枠内に合わせてください";
            position: absolute; bottom: -40px; left: 0; width: 100%;
            text-align: center; color: var(--accent); font-weight: bold; font-size: 0.8rem;
        }

        /* 下部リザルトエリア */
        /* --- 変更点：下部パネルの高さとカートアイテム用スタイル --- */
       .result-panel {
            flex-shrink: 0;
            /* モバイル横向きでの圧迫を防ぐため、最小高さを抑える */
            min-height: 120px; 
            background: var(--white); 
            color: var(--black);
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 3px solid var(--black);
            display: flex; 
            flex-direction: column;
        } 
        
        #scanned-item-area {
            flex: 1; 
            overflow-y: hidden;
            /* アイテムリストの最後に少し余裕を持たせる */
            padding-bottom: 10px;
        }

        /* register.htmlから踏襲したスタイル */
        .cart-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid #000; font-weight: 800; font-size: 0.85rem; width: 100%; }
        .cart-item-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 32px; height: 32px; background: #fff; border: 2px solid #000; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #last-code { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }

        .cat-tab { padding: 8px 16px; background: var(--white); border: 2px solid var(--black); font-weight: 800; font-size: 0.8rem; cursor: pointer; white-space: nowrap; box-shadow: 2px 2px 0px var(--black); border-radius: 0; }
        .cat-tab.active { background: var(--black); color: var(--white); transform: translate(1px, 1px); box-shadow: none; }

        /* CSS: 割引ボタンのスタイル追加 */
        .discount-btn {
            margin-left: 10px;
            background: #fff;
            border: 1px solid var(--black);
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 900;
            cursor: pointer;
        }
        /* キーパッド用のモーダル（未実装だった場合のための基本構造） */
        /* --- テンキー（keypadModal）のデザイン修正 --- */
#keypadModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center; /* 垂直中央 */
    justify-content: center; /* 水平中央 */
    z-index: 30000;
}

#keypadModal .modal-content {
    background: #fff;
    padding: 20px;
    border: 4px solid #000;
    width: 90%;
    max-width: 320px; /* サイズを少しコンパクトに調整 */
    box-shadow: 10px 10px 0 #000;
    position: relative;
}

#keypadModal .numpad-display {
    width: 100%;
    padding: 10px;
    font-size: 1.5rem;
    border: 3px solid #000;
    text-align: right;
    font-weight: 900;
    margin-bottom: 10px;
    background: #eee;
    box-sizing: border-box;
}

#keypadModal .numpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

#keypadModal .num-btn {
    padding: 10px;
    border: 2px solid #000;
    background: #fff;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
}

#keypadModal .num-btn:active {
    background: #eee;
    transform: translate(2px, 2px);
}

/* プリセットボタンのデザイン */
#keypadModal .discount-presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    margin-top: 10px;
}

#keypadModal .preset-btn {
    background: #fff;
    border: 2px solid #ff0000; /* --danger相当 */
    color: #ff0000;
    padding: 8px 5px;
    font-weight: 800;
    font-size: 0.8rem;
    cursor: pointer;
    box-shadow: none;
}

/* 確定・キャンセルボタン */
#keypadModal .btn-black {
    width: 100%;
    background: #000;
    color: #fff;
    padding: 12px;
    border: none;
    font-weight: 900;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 8px;
}

#keypadModal .btn-outline {
    width: 100%;
    background: #fff;
    color: #000;
    padding: 12px;
    border: 2px solid #000;
    font-weight: 900;
    cursor: pointer;
    margin-top: 8px;
}

        /* 横画面（Landscape）時の最適化 */
        @media screen and (orientation: landscape) {
            .result-panel {
                min-height: 100px; /* パネルをさらに低く */
                padding-top: 5px;
            }
            #scanned-item-area {
                padding-bottom: 5px;
            }
            .cart-item {
                padding: 4px 0; /* アイテムの上下余白を削る */
            }
            .scan-overlay {
                height: 50%; /* 枠を少し広げて見やすく */
            }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="btn-back" onclick="goBack()">← 戻る</button>
    </div>
    <div class="header-ad-space" id="ad-top">
        <span style="color:#ccc; font-size: 8px; font-weight: 900;">AD</span>
    </div>
    <button id="clerk-call-btn" class="cat-tab" style="display: none; margin-left: 10px; padding: 6px 12px; font-size: 0.9rem; background-color: red; color: #ffffff; border: 4px solid #ffffff; border-radius: 10px; box-shadow: none; font-weight: 900; outline: none;">店員呼出</button>
</header>

<div id="interactive" class="viewport">
    <div class="scan-overlay"></div>
</div>

<div class="result-panel">
    <div id="scanned-item-area">
        <div style="text-align: center; color: #999; margin-top: 20px;">バーコードを読み取ってください</div>
    </div>
</div>

<div id="keypadModal" class="modal hidden">
    <div class="modal-content">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
        <h3 id="keypadTitle" style="margin-bottom: 10px; font-weight: 900;">金額入力</h3>
        <div id="discountModeSelector" style="display: none; gap: 5px;">
            <button id="mode-unit" class="cat-tab" onclick="setDiscountMode('unit')" style="padding: 4px 8px; font-size: 0.7rem;">バラ</button>
            <button id="mode-total" class="cat-tab active" onclick="setDiscountMode('total')" style="padding: 4px 8px; font-size: 0.7rem;">まとめ</button>
        </div>
        </div>
        <div id="keypadDisplay" class="numpad-display">0</div>
        <div class="numpad-grid">
            <button class="num-btn" onclick="pressNum('7')">7</button>
            <button class="num-btn" onclick="pressNum('8')">8</button>
            <button class="num-btn" onclick="pressNum('9')">9</button>
            <button class="num-btn" onclick="pressNum('4')">4</button>
            <button class="num-btn" onclick="pressNum('5')">5</button>
            <button class="num-btn" onclick="pressNum('6')">6</button>
            <button class="num-btn" onclick="pressNum('1')">1</button>
            <button class="num-btn" onclick="pressNum('2')">2</button>
            <button class="num-btn" onclick="pressNum('3')">3</button>
            <button class="num-btn" onclick="pressNum('0')">0</button>
            <button class="num-btn" onclick="pressNum('00')">00</button>
            <button id="discountUnitBtn" class="num-btn" onclick="toggleDiscountUnit()" style="background: #eee; border-color: #000;">¥</button>
        </div>
        <div id="discountPresetArea" class="discount-presets"></div>
        <button id="keypadConfirmBtn" class="btn-black">確定</button>
        <button onclick="closeModal('keypadModal')" class="btn-outline">キャンセル</button>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode');
const STORAGE_KEYS = { PRODUCTS: 'rapireji_products' };
let isPaused = false;
let keypadMode = 'qty'; // 'qty' or 'discount'
let keypadBuffer = "0";
let editingItemIndex = null;
let currentDiscountMode = 'total'; // 'unit' or 'total'
const STORAGE_DISCOUNTS = 'rapireji_discounts';

// UIの初期化
const modeLabel = document.getElementById('mode-label');

const btnAudio = new Audio('beep1.mp3');
const scanAudio3 = new Audio('beep3.mp3');
const scanAudio4 = new Audio('beep4.mp3');
const scanAudio5 = new Audio('beep5.mp3');
let audioUnlocked = false;

// <script> 内の冒頭付近に追加
window.addEventListener('DOMContentLoaded', () => {
    const currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    if (currentOrder.isRefund) {
        document.body.classList.add('refund-mode');
    }
});

document.addEventListener('touchstart', () => {
    if (!audioUnlocked) {
        const b1 = new Audio('beep1.mp3'); 
        // btnAudio を含めてアンロック
        [scanAudio3, scanAudio4, scanAudio5, btnAudio].forEach(audio => {
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(() => {});
        });
        audioUnlocked = true;
    }
}, { once: true });

function playBeep(type = 'beep3') {
    let sounds;
    try {
        const raw = localStorage.getItem('rapireji_sounds');
        sounds = raw ? JSON.parse(raw) : {btn: true, pay: true, scan: true, error: true};
    } catch (e) {
        sounds = {btn: true, pay: true, scan: true, error: true};
    }

    if (type === 'beep4' && sounds.error === false) return;
    if (type === 'beep1' && sounds.btn === false) return;
    if (type === 'beep3' && sounds.scan === false) return;

   // targetAudio の割り当てを修正
    let targetAudio = (type === 'beep4') ? scanAudio4 : (type === 'beep3') ? scanAudio3 : btnAudio;
    targetAudio.currentTime = 0;
    targetAudio.play().catch(e => console.warn("音声再生に失敗:", e));
}

function playRegisterSound() {
    playBeep('beep1');
}

function showPopup(message, isError = false) {
    const popup = document.createElement('div');
    popup.style = `
        position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'red' : 'rgba(0,255,0,0.9)'}; color: ${isError ? 'white' : 'black'};
        padding: 12px 24px; border-radius: 8px; font-weight: bold; z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: opacity 0.5s;
    `;
    popup.innerText = message;
    document.body.appendChild(popup);
    setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
    }, 1500);
}

// Quagga初期化
Quagga.init({
    inputStream: {
        name: "Live", type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: { facingMode: "environment", aspectRatio: { min: 1, max: 2 } },
    },
    decoder: { readers: ["ean_reader", "ean_8_reader"] }
}, function(err) {
    if (err) { console.error(err); return; }
    Quagga.start();
});

Quagga.onDetected((data) => {
    if (isPaused) return;
    const code = data.codeResult.code;
    isPaused = true;
    handleScannedCode(code);
});

async function handleScannedCode(code) {
    if (mode === 'reg') {
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => (String(p.jan) === String(code) || String(p.id) === String(code)));
        setTimeout(() => { isPaused = false; }, 1500);

        if (product) {
            playBeep('beep3');
            let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
            let existing = currentOrder.items.find(item => String(item.id) === String(product.id));

            if (existing) {
                existing.qty++;
            } else {
                existing = { id: product.id, name: product.name, price: Number(product.price), qty: 1 };
                currentOrder.items.push(existing);
            }
            saveOrderWithCalculation(currentOrder, products);
            updateScannedUI(existing, product);
        } else {
            playBeep('beep4');
            showPopup(`未登録の商品です (${code})`, true);
        }
        setTimeout(() => { isPaused = false; }, 1500);
    } else {
        playBeep('beep3');
        localStorage.setItem('last_scanned_barcode', code);
        showPopup(`コード保存: ${code}`);
        setTimeout(() => goBack(), 1000);
    }
}

function updateScannedUI(item, originalProduct) {
    const area = document.getElementById('scanned-item-area');
    const currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    const index = currentOrder.items.findIndex(i => String(i.id) === String(item.id));
    const isRefund = currentOrder.isRefund || false;

    // 1. 税率の取得
    const taxRate = Number(originalProduct ? originalProduct.taxRate : (item.taxRate || 0));
    
    // 2. 計算：(税抜単価 * 数量 - 割引額) * 税率
    const subtotalExclTax = item.price * item.qty; // 税抜の小計
    let discountAmount = 0;
    if (item.discountValue) {
        if (item.discountUnit === "%") {
            discountAmount = Math.floor(subtotalExclTax * (item.discountValue / 100));
        } else {
            discountAmount = (item.discountMode === 'unit') ? (item.discountValue * item.qty) : item.discountValue;
        }
    }

    // 割引後の税抜金額に税率を掛けて、最終的な1行の税込合計を出す
    const discountedSubtotal = subtotalExclTax - discountAmount;
    const rowTotal = Math.floor(discountedSubtotal * (1 + taxRate / 100));

    // 3. ラベルと記号の設定
    const adjustLabel = isRefund ? "金額調整" : "割引";
    const sign = isRefund ? "-" : "";

    // 割引・調整額の表示テキストを出し分け
    const discountDisplay = discountAmount > 0 
        ? (isRefund 
            ? `<small style="color:red; margin-left:5px;">調整額:${discountAmount.toLocaleString()}円</small>` 
            : `<small style="color:red; margin-left:5px;">-${discountAmount.toLocaleString()}円</small>`)
        : '';

    // --- 4. UIの更新 (割引ボタンの表示判定を修正) ---
const isStaff = sessionStorage.getItem('staff_override') === 'true';
const selfConfig = JSON.parse(localStorage.getItem('rapireji_self_config') || '{"enabled": false}');

let showDiscountBtn = true;
if (selfConfig.enabled && !isStaff) {
    showDiscountBtn = false;
}
if (isRefund) {
    showDiscountBtn = true; // 返金（金額調整）の場合は常に表示
}

area.innerHTML = `
    <div class="cart-item">
        <div class="cart-item-top">
            <span>${item.name} <small>(${taxRate}%)</small></span>
            <span>¥${sign}${rowTotal.toLocaleString()}</span>
        </div>
        <div class="cart-item-controls">
            <button class="qty-btn" onclick="window.changeQtyScan('${item.id}', -1)">-</button>
            <span style="margin:0 10px; cursor:pointer;" onclick="openKeypad('qty', ${index})">× ${item.qty}</span>
            <button class="qty-btn" onclick="window.changeQtyScan('${item.id}', 1)">+</button>
            
            ${showDiscountBtn ? `<button class="discount-btn" onclick="openKeypad('discount', ${index})">${adjustLabel}</button>` : ''}
            
            ${discountDisplay}
            <button onclick="window.removeItemScan('${item.id}')" style="margin-left:auto; background:none; border:none; color:red; font-weight:bold; cursor:pointer;">削除</button>
        </div>
    </div>
`;
}

window.changeQtyScan = (id, diff) => {
    if (typeof playBeep === 'function') playBeep('beep1');
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    let itemIndex = currentOrder.items.findIndex(i => String(i.id) === String(id));
    
    if (itemIndex > -1) {
        let item = currentOrder.items[itemIndex];
        item.qty += diff;
        if (item.qty <= 0) {
            window.removeItemScan(id);
            return;
        }
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => String(p.id) === String(id));
        saveOrderWithCalculation(currentOrder, products);
        updateScannedUI(item, product);
    }
};

window.removeItemScan = (id) => {
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    currentOrder.items = currentOrder.items.filter(i => String(i.id) !== String(id));
    const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
    saveOrderWithCalculation(currentOrder, products);
    document.getElementById('scanned-item-area').innerHTML = '<div style="text-align: center; color: #999; margin-top: 20px;">削除しました。スキャンを続けてください</div>';
};

function saveOrderWithCalculation(order, products) {
    let finalSubtotal = 0;
    let finalTaxTotal = 0;
    let subtotalByRate = {};

    order.items.forEach(it => {
        const pInfo = products.find(p => String(p.id) === String(it.id));
        const rate = pInfo ? Number(pInfo.taxRate || 0) : 0;
        // 1. 税抜の状態での合計を出す
        let lineSubtotal = it.price * it.qty;
        
        // 2. 割引・調整を税抜合計から差し引く
        let discountAmount = 0;
        if (it.discountValue) {
            if (it.discountUnit === "%") {
                discountAmount = Math.floor(lineSubtotal * (it.discountValue / 100));
            } else {
                discountAmount = (it.discountMode === 'unit') ? (it.discountValue * it.qty) : it.discountValue;
            }
        }
        
        const discountedLineTotal = lineSubtotal - discountAmount;
        
        // 3. 税率ごとに税抜金額（割引後）を集計
        if (!subtotalByRate[rate]) subtotalByRate[rate] = 0;
        subtotalByRate[rate] += discountedLineTotal;
    });

    Object.keys(subtotalByRate).forEach(rate => {
        const r = Number(rate);
        const sub = subtotalByRate[r];
        finalTaxTotal += Math.floor(sub * (r / 100));
        finalSubtotal += sub;
    });

    order.totalAmount = finalSubtotal + finalTaxTotal;
    order.taxDetails = subtotalByRate;
    sessionStorage.setItem('currentOrder', JSON.stringify(order));
}

  let discountUnit = "¥";

    // openKeypad 関数の中、もしくは割引入力モードの初期化処理に追加してください
const discArea = document.getElementById('discountPresetArea');
if (discArea) {
    discArea.innerHTML = "";
    const savedDiscounts = JSON.parse(localStorage.getItem('rapireji_discounts')) || [];

    savedDiscounts.forEach(item => {
        if (item.name) {
            const b = document.createElement('button');
            b.className = 'preset-btn';
            const displayVal = item.isPercent ? `${item.value}%` : `¥${item.value}`;
            b.innerText = `${item.name}\n${displayVal}`;

            b.onclick = () => {
                playRegisterSound();
                const item = cart[editingItemIndex];
    if (item) {
        if (!item.appliedPresets) item.appliedPresets = {};
        // プリセットの名前（例: "学割"）をキーにして回数を加算
        const pName = preset.name || "割引";
        item.appliedPresets[pName] = (item.appliedPresets[pName] || 0) + 1;
    }
                const newUnit = item.isPercent ? "%" : "¥";
                if (discountUnit !== newUnit) {
                    discountUnit = newUnit;
                    keypadBuffer = "0";
                    const unitBtn = document.getElementById('discountUnitBtn');
                    if (unitBtn) unitBtn.innerText = discountUnit;
                }
                keypadBuffer = String(Number(keypadBuffer) + Number(item.value));
                updateKeypadDisplay();
            };
            discArea.appendChild(b);
        }
    });
}

window.setDiscountMode = (mode) => {
    playRegisterSound();
    currentDiscountMode = mode;
    document.getElementById('mode-unit').classList.toggle('active', mode === 'unit');
    document.getElementById('mode-total').classList.toggle('active', mode === 'total');
};

    window.openKeypad = (mode, index = null) => {
        playRegisterSound();
        keypadMode = mode;
        keypadBuffer = "0";
        editingItemIndex = index;

        const selector = document.getElementById('discountModeSelector');
        const unitBtn = document.getElementById('discountUnitBtn');
        const presets = document.getElementById('discountPresetArea');
        const currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
        const item = currentOrder.items[index];
        const title = document.getElementById('keypadTitle');
        const isRefund = JSON.parse(sessionStorage.getItem('currentOrder') || '{}').isRefund;
        /*const savedDiscounts = JSON.parse(localStorage.getItem(STORAGE_KEYS.DISCOUNTS) || '[]');*/

        if (mode === 'qty') {
            title.innerText = "数量入力";
            selector.style.display = 'none';
            unitBtn.style.visibility = 'hidden'; 
            presets.style.display = 'none';
        } else {
            title.innerText = isRefund ? "個別調整入力" : "個別割引入力";
            if (item) {
            item.appliedPresets = {}; 
            item.discountValue = 0; // 金額も一旦0に
        }
            selector.style.display = 'flex';
            unitBtn.style.visibility = 'visible';
            discountUnit = "¥";
            unitBtn.innerText = discountUnit;
            presets.style.display = 'grid';
            setDiscountMode('total');

            const savedDiscounts = JSON.parse(localStorage.getItem('rapireji_discounts') || '[]');
            presets.innerHTML = "";
            savedDiscounts.forEach(d => {
                if (d.name) {
                    const b = document.createElement('button');
                    b.className = 'preset-btn';
                    const displayVal = d.isPercent ? `${d.value}%` : `¥${Number(d.value).toLocaleString()}`;
                    b.innerText = `${d.name}\n${displayVal}`;
                    b.onclick = () => applyPreset(d.value, d.isPercent ? "%" : "¥", d.name);
                    presets.appendChild(b);
                }
            });
        }
    
        updateKeypadDisplay(); 
        document.getElementById('keypadModal').classList.remove('hidden');
    };

    window.applyPreset = (val, unit, presetName) => {
        playRegisterSound();
        const currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
        const item = currentOrder.items[editingItemIndex];
        if (!item) return;

        if (!item.appliedPresets) item.appliedPresets = {};
        const name = presetName || "割引";
        item.appliedPresets[name] = (item.appliedPresets[name] || 0) + 1;
        if (discountUnit !== unit) {
            discountUnit = unit;
            keypadBuffer = "0"; 
            const unitBtn = document.getElementById('discountUnitBtn');
            if (unitBtn) unitBtn.innerText = discountUnit;
        }

        keypadBuffer = String(Number(keypadBuffer) + Number(val));
        sessionStorage.setItem('currentOrder', JSON.stringify(currentOrder));
        updateKeypadDisplay();
    };

    window.toggleDiscountUnit = () => {
        playRegisterSound();
        discountUnit = (discountUnit === "¥") ? "%" : "¥";
        document.getElementById('discountUnitBtn').innerText = discountUnit;
        updateKeypadDisplay();
    };

    function updateKeypadDisplay() {
        const display = document.getElementById('keypadDisplay');
        if (keypadMode === 'qty') {
            display.innerText = keypadBuffer;
        } else {
            display.innerText = (discountUnit === "%") ? keypadBuffer + "%" : "¥" + Number(keypadBuffer).toLocaleString();
        }
    }  

window.confirmKeypad = () => {
    playRegisterSound();
    const val = Number(keypadBuffer);
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    const item = currentOrder.items[editingItemIndex];

    if (keypadMode === 'qty') {
        if (val > 0) {
            item.qty = val;
        } else {
            alert("1以上の数値を入力してください。"); 
            return;
        }
    } else {
        const currentSubtotal = item.price * item.qty; 
        const isRefund = JSON.parse(sessionStorage.getItem('currentOrder') || '{}').isRefund;
        const msgType = isRefund ? "調整" : "割引";
        
        if (discountUnit === "%") {
            if (val > 100) {
                alert(`${msgType}率が100%を超えています。`);
                return;
            }
        } else {
            let totalDiscountCheck = 0;
            if (currentDiscountMode === 'unit') {
                totalDiscountCheck = val * item.qty; 
            } else {
                totalDiscountCheck = val; 
            }

            if (totalDiscountCheck > currentSubtotal) {
                alert(`${msgType}額が商品の合計金額を超えています。`);
                return;
            }
        }

        item.discountValue = val;
        item.discountUnit = discountUnit;
        item.discountMode = currentDiscountMode; 
    }
    const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
    saveOrderWithCalculation(currentOrder, products);

    closeKeypad();
    const product = products.find(p => String(p.id) === String(item.id));
    updateScannedUI(item, product);
};

    window.closeModal = (id) => {
    if (id === 'keypadModal') window.closeKeypad();
};

// --- キー入力処理の統合（pressNumに統一） ---
window.pressNum = (key) => {
    playRegisterSound();
    const currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    const item = currentOrder.items[editingItemIndex];
    if (item) {
        item.hasManualInput = true;
        sessionStorage.setItem('currentOrder', JSON.stringify(currentOrder));
    }
    if (keypadBuffer === "0") {
        keypadBuffer = (key === '0' || key === '00') ? "0" : String(key);
    } else {
        keypadBuffer += String(key);
    }
    updateKeypadDisplay();
};

// --- テンキーを閉じる処理 ---
window.closeKeypad = () => {
    playRegisterSound();
    document.getElementById('keypadModal').classList.add('hidden');
    keypadBuffer = "0";
};

// --- モーダルを閉じる汎用関数（closeKeypadを呼び出すよう統合） ---
window.closeModal = (id) => {
    if (id === 'keypadModal') {
        window.closeKeypad();
    } else {
        const modal = document.getElementById(id);
        if (modal) modal.classList.add('hidden');
    }
};

// --- 確定ボタンのイベント紐付け ---
document.getElementById('keypadConfirmBtn').onclick = () => {
    window.confirmKeypad();
};

document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const fromPage = urlParams.get('from'); 
    
    // 1. URLパラメータに selfCheckout=false があれば、即座に店員モードをONにする
    if (urlParams.get('selfCheckout') === 'false') {
        sessionStorage.setItem('staff_override', 'true');
    }

    // 2. 現在の状態を確認
    const isStaff = sessionStorage.getItem('staff_override') === 'true';
    const isFromReturn = (fromPage === 'ret' || fromPage === 'return');
    const selfConfig = JSON.parse(localStorage.getItem('rapireji_self_config') || '{"enabled": false}');

    const clerkBtn = document.getElementById('clerk-call-btn');

    // 3. 表示ロジック
    if (isFromReturn) {
        // 返品画面経由なら常に非表示
        clerkBtn.style.display = "none";
    } 
    else if (isStaff) {
        // 店員モードなら「セルフに戻す」を表示
        clerkBtn.innerText = "リセット";
        clerkBtn.style.backgroundColor = "#000"; 
        clerkBtn.style.display = "block";
        clerkBtn.onclick = () => {
            if(confirm("店員モードを終了し、セルフレジに戻りますか？")) {
                sessionStorage.removeItem('staff_override');
                // パラメータを消してリロード
                location.href = 'scan.html'; 
            }
        };
    } 
    else if (selfConfig.enabled) {
        // セルフモードなら「店員呼出」を表示
        clerkBtn.innerText = "店員呼出";
        clerkBtn.style.backgroundColor = "red";
        clerkBtn.style.display = "block";
        clerkBtn.onclick = () => {
            scanAudio5.currentTime = 0;
            scanAudio5.play().catch(e => console.warn("音声再生に失敗:", e));
            setTimeout(() => { location.href = 'clerk.html?from=scan'; }, 150);
        };
    } else {
        clerkBtn.style.display = "none";
    }

    // 戻るボタンの挙動
    window.goBack = () => {
        playRegisterSound();
        if (isFromReturn) {
            location.href = 'return.html';
        } else {
            location.href = 'register.html';
        }
    };
});
   
</script>
