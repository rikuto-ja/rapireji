<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スキャン | らぴレジ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        /* --- 以下の内容に差し替え --- */
        :root { 
            --black: #000000; --white: #ffffff; --accent: #00ff00; 
            --header-h: 60px; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }

        body { background: var(--black); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header {
            height: calc(var(--header-h) + env(safe-area-inset-top)); 
            border-bottom: 3px solid var(--black);
            display: flex; 
            align-items: center; 
            padding: env(safe-area-inset-top) 20px 0 20px; 
            background: var(--white);
            color: var(--black);
            position: sticky; 
            top: 0; 
            z-index: 1100;
            justify-content: space-between;
        }

        /* 戻るボタン：お支払い画面の四角い枠線を移植 */
        .header-left { display: flex; align-items: center; }
        .btn-back { 
            background: var(--white); border: 2px solid var(--black); 
            padding: 8px 15px; font-weight: 900; cursor: pointer; 
            margin-right: 15px; font-size: 0.9rem; color: var(--black);
        }

        /* 広告スペース：お支払い画面と同じ設計 */
        .header-ad-space {
            flex: 1; margin-left: 10px; height: 40px; background: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px dashed #ccc;
        }
    
        .mode-badge { background: var(--black); color: var(--white); padding: 4px 8px; font-weight: 900; font-size: 0.8rem; }

        /* カメラ表示エリア */
        #interactive.viewport {
            flex: 1; position: relative; overflow: hidden; width: 100%;
        }
        #interactive.viewport video {
            width: 100%; height: 100%; object-fit: cover;
        }
        
        /* 読み取りガイドの枠 */
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 30%; border: 2px solid var(--accent);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .scan-overlay::after {
            content: "バーコードを枠内に合わせてください";
            position: absolute; bottom: -40px; left: 0; width: 100%;
            text-align: center; color: var(--accent); font-weight: bold; font-size: 0.8rem;
        }

        /* 下部リザルトエリア */
        /* --- 変更点：下部パネルの高さとカートアイテム用スタイル --- */
        .result-panel {
            height: calc(240px + env(safe-area-inset-bottom)); /* 少し高さを広げる */
            background: var(--white); color: var(--black);
            padding: 10px 10px calc(20px + env(safe-area-inset-bottom));
            border-top: 3px solid var(--black);
            display: flex; flex-direction: column;
        }  
        
        #scanned-item-area {
            flex: 1; 
            overflow-y: auto;
            /* アイテムリストの最後に少し余裕を持たせる */
            padding-bottom: 10px;
        }

        /* register.htmlから踏襲したスタイル */
        .cart-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid #000; font-weight: 800; font-size: 0.85rem; width: 100%; }
        .cart-item-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 32px; height: 32px; background: #fff; border: 2px solid #000; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #last-code { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="btn-back" onclick="history.back()">← 戻る</button>
    </div>
    <div class="header-ad-space" id="ad-top">
        <span style="color:#ccc; font-size: 8px; font-weight: 900;">AD</span>
    </div>
</header>

<div id="interactive" class="viewport">
    <div class="scan-overlay"></div>
</div>

<div class="result-panel">
    <div id="scanned-item-area">
        <div style="text-align: center; color: #999; margin-top: 20px;">バーコードを読み取ってください</div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode');
const STORAGE_KEYS = { PRODUCTS: 'rapireji_products' };
let isPaused = false;

// UIの初期化
const modeLabel = document.getElementById('mode-label');

const scanAudio3 = new Audio('beep3.mp3');
const scanAudio4 = new Audio('beep4.mp3');
let audioUnlocked = false;

document.addEventListener('touchstart', () => {
    if (!audioUnlocked) {
        const b1 = new Audio('beep1.mp3'); 
        [scanAudio3, scanAudio4, b1].forEach(audio => {
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(() => {});
        });
        audioUnlocked = true;
    }
}, { once: true });

function playBeep(type = 'beep3') {
    let sounds;
    try {
        const raw = localStorage.getItem('rapireji_sounds');
        sounds = raw ? JSON.parse(raw) : {btn: true, pay: true, scan: true, error: true};
    } catch (e) {
        sounds = {btn: true, pay: true, scan: true, error: true};
    }

    if (type === 'beep4' && sounds.error === false) return;
    if (type === 'beep1' && sounds.btn === false) return;
    if (type === 'beep3' && sounds.scan === false) return;

    let targetAudio = (type === 'beep4') ? scanAudio4 : (type === 'beep3') ? scanAudio3 : new Audio('beep1.mp3');
    targetAudio.currentTime = 0;
    targetAudio.play().catch(e => console.warn("音声再生に失敗:", e));
}

function showPopup(message, isError = false) {
    const popup = document.createElement('div');
    popup.style = `
        position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'red' : 'rgba(0,255,0,0.9)'}; color: ${isError ? 'white' : 'black'};
        padding: 12px 24px; border-radius: 8px; font-weight: bold; z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: opacity 0.5s;
    `;
    popup.innerText = message;
    document.body.appendChild(popup);
    setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
    }, 1500);
}

// Quagga初期化
Quagga.init({
    inputStream: {
        name: "Live", type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: { facingMode: "environment", aspectRatio: { min: 1, max: 2 } },
    },
    decoder: { readers: ["ean_reader", "ean_8_reader"] }
}, function(err) {
    if (err) { console.error(err); return; }
    Quagga.start();
});

Quagga.onDetected((data) => {
    if (isPaused) return;
    const code = data.codeResult.code;
    isPaused = true;
    handleScannedCode(code);
});

async function handleScannedCode(code) {
    if (mode === 'reg') {
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => (String(p.jan) === String(code) || String(p.id) === String(code)));

        if (product) {
            playBeep('beep3');
            let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
            let existing = currentOrder.items.find(item => String(item.id) === String(product.id));

            if (existing) {
                existing.qty++;
            } else {
                existing = { id: product.id, name: product.name, price: Number(product.price), qty: 1 };
                currentOrder.items.push(existing);
            }
            saveOrderWithCalculation(currentOrder, products);
            updateScannedUI(existing, product);
        } else {
            playBeep('beep4');
            showPopup(`未登録の商品です (${code})`, true);
        }
        setTimeout(() => { isPaused = false; }, 1500);
    } else {
        playBeep('beep3');
        localStorage.setItem('last_scanned_barcode', code);
        showPopup(`コード保存: ${code}`);
        setTimeout(() => history.back(), 1000);
    }
}

function updateScannedUI(item, originalProduct) {
    const area = document.getElementById('scanned-item-area');
    const taxRate = Number(originalProduct ? originalProduct.taxRate : (item.taxRate || 0));
    const priceInclTax = Math.floor(item.price * (1 + taxRate / 100));
    const rowTotal = priceInclTax * item.qty;

    area.innerHTML = `
        <div class="cart-item">
            <div class="cart-item-top">
                <span>${item.name} <small>(${taxRate}%)</small></span>
                <span>¥${rowTotal.toLocaleString()}</span>
            </div>
            <div class="cart-item-controls">
                <button class="qty-btn" onclick="window.changeQtyScan('${item.id}', -1)">-</button>
                <span style="margin:0 10px; font-size:1.2rem;">× ${item.qty}</span>
                <button class="qty-btn" onclick="window.changeQtyScan('${item.id}', 1)">+</button>
                <button onclick="window.removeItemScan('${item.id}')" style="margin-left:auto; background:none; border:none; color:red; font-weight:bold; cursor:pointer;">削除</button>
            </div>
        </div>
    `;
}

window.changeQtyScan = (id, diff) => {
    if (typeof playBeep === 'function') playBeep('beep1');
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    let itemIndex = currentOrder.items.findIndex(i => String(i.id) === String(id));
    
    if (itemIndex > -1) {
        let item = currentOrder.items[itemIndex];
        item.qty += diff;
        if (item.qty <= 0) {
            window.removeItemScan(id);
            return;
        }
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => String(p.id) === String(id));
        saveOrderWithCalculation(currentOrder, products);
        updateScannedUI(item, product);
    }
};

window.removeItemScan = (id) => {
    let currentOrder = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[]}');
    currentOrder.items = currentOrder.items.filter(i => String(i.id) !== String(id));
    const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
    saveOrderWithCalculation(currentOrder, products);
    document.getElementById('scanned-item-area').innerHTML = '<div style="text-align: center; color: #999; margin-top: 20px;">削除しました。スキャンを続けてください</div>';
};

function saveOrderWithCalculation(order, products) {
    let finalSubtotal = 0;
    let finalTaxTotal = 0;
    let subtotalByRate = {};

    order.items.forEach(it => {
        const pInfo = products.find(p => String(p.id) === String(it.id));
        const rate = pInfo ? Number(pInfo.taxRate || 0) : 0;
        if (!subtotalByRate[rate]) subtotalByRate[rate] = 0;
        subtotalByRate[rate] += (it.price * it.qty);
    });

    Object.keys(subtotalByRate).forEach(rate => {
        const r = Number(rate);
        const sub = subtotalByRate[r];
        finalTaxTotal += Math.floor(sub * (r / 100));
        finalSubtotal += sub;
    });

    order.totalAmount = finalSubtotal + finalTaxTotal;
    order.taxDetails = subtotalByRate;
    sessionStorage.setItem('currentOrder', JSON.stringify(order));
}</script>
</body>
</html>
