<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スキャン | らぴレジ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --black: #000000; --white: #ffffff; --accent: #00ff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--black); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* スキャン画面のヘッダー */
        header {
            height: 60px; padding-top: env(safe-area-inset-top);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 20px; background: var(--white); color: var(--black);
            border-bottom: 3px solid var(--black);
        }
        .mode-badge { background: var(--black); color: var(--white); padding: 4px 8px; font-weight: 900; font-size: 0.8rem; }

        /* カメラ表示エリア */
        #interactive.viewport {
            flex: 1; position: relative; overflow: hidden; width: 100%;
        }
        #interactive.viewport video {
            width: 100%; height: 100%; object-fit: cover;
        }
        
        /* 読み取りガイドの枠 */
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 30%; border: 2px solid var(--accent);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .scan-overlay::after {
            content: "バーコードを枠内に合わせてください";
            position: absolute; bottom: -40px; left: 0; width: 100%;
            text-align: center; color: var(--accent); font-weight: bold; font-size: 0.8rem;
        }

        /* 下部リザルトエリア */
        /* 下部エリア：レジ画面の構成を移植 */
        .result-panel {
            height: 45vh; background: var(--white); color: var(--black);
            border-top: 3px solid var(--black); display: flex; flex-direction: column; overflow: hidden;
        }
        #last-code { 
            padding: 8px; background: #eee; text-align: center; 
            font-size: 1.2rem; font-weight: 900; border-bottom: 1px solid #000;
        }
        /* リスト表示部分 */
        .cart-list { flex: 1; overflow-y: auto; padding: 10px; }
        .cart-item { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid #000; font-weight: 800; font-size: 0.85rem; }
        .cart-item-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        /* 合計・決済エリア */
        .cart-total { padding: 15px; border-top: 3px solid var(--black); background: var(--white); flex-shrink: 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 900; margin-bottom: 10px; }
        .checkout-btn { width: 100%; background: var(--black); color: var(--white); border: none; padding: 15px; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .sub-btn { width: 100%; background: none; border: none; padding: 10px; text-decoration: underline; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; cursor: pointer;" onclick="history.back()">← 戻る</div>
    <div id="mode-label" class="mode-badge">読み込み中...</div>
</header>

<div id="interactive" class="viewport">
    <div class="scan-overlay"></div>
</div>

<div class="result-panel">
    <div id="last-code">読み取り待機中</div>
    
    <div class="cart-list reg-only" id="cartList"></div>

    <div class="cart-total reg-only" id="cartTotalArea">
        <div class="total-row">
            <span>合計</span>
            <span id="totalAmount">¥0</span>
        </div>
        <button class="checkout-btn" onclick="location.href='payment.html'">決済画面へ</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode'); // 'reg' (注文リスト追加), 'add' (JANコード1回登録)
const STORAGE_KEYS = { PRODUCTS: 'rapireji_products' };
let isPaused = false;

// UIの初期化
const modeLabel = document.getElementById('mode-label');
const backBtn = document.querySelector('.back-btn');

if (mode === 'reg') {
    modeLabel.innerText = "注文スキャンモード";
    backBtn.innerText = "レジに戻る";
} else {
    modeLabel.innerText = "JAN登録モード";
    backBtn.innerText = "商品登録に戻る";
}

// スキャン音のインスタンスを固定
const scanAudio3 = new Audio('beep3.mp3');
const scanAudio4 = new Audio('beep4.mp3'); // 未登録用

// ブラウザの音声ブロックを解除するためのフラグ
let audioUnlocked = false;

// 画面のどこかを触ったら音声のロックを解除する（両方の音を許可させる）
document.addEventListener('touchstart', () => {
    if (!audioUnlocked) {
        // 両方の音を一度再生して即停止することでブラウザの許可を得る
        [scanAudio3, scanAudio4].forEach(audio => {
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(() => {});
        });
        audioUnlocked = true;
    }
}, { once: true });

// 引数でファイル名を指定できるように修正
function playBeep(type = 'beep3') {
    // 最新の設定を取得（デフォルト値に error も追加）
    const sounds = JSON.parse(localStorage.getItem('rapireji_sounds')) || {btn: true, pay: true, scan: true, error: true};

    // タイプ別に出し分けを判定
    if (type === 'beep4') {
        if (sounds.error === false) return; // エラー音がOFFなら終了
    } else {
        if (sounds.scan === false) return;  // 通常スキャン音がOFFなら終了
    }

    const targetAudio = (type === 'beep4') ? scanAudio4 : scanAudio3;
    targetAudio.currentTime = 0;
    targetAudio.play().catch(e => console.warn("音声再生に失敗:", e));
}

// ポップアップ表示（トースト）
function showPopup(message, isError = false) {
    const popup = document.createElement('div');
    popup.style = `
        position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'red' : 'rgba(0,255,0,0.9)'}; color: ${isError ? 'white' : 'black'};
        padding: 12px 24px; border-radius: 8px; font-weight: bold; z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: opacity 0.5s;
    `;
    popup.innerText = message;
    document.body.appendChild(popup);
    setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
    }, 1500);
}

// Quagga初期化
Quagga.init({
    inputStream: {
        name: "Live", type: "LiveStream",
        target: document.querySelector('#interactive'),
        constraints: { facingMode: "environment", aspectRatio: { min: 1, max: 2 } },
    },
    decoder: { readers: ["ean_reader", "ean_8_reader"] }
}, function(err) {
    if (err) { console.error(err); return; }
    Quagga.start();
});

Quagga.onDetected((data) => {
    if (isPaused) return;
    const code = data.codeResult.code;
    isPaused = true;
    
    handleScannedCode(code);
});

async function handleScannedCode(code) {
    document.getElementById('last-code').innerText = code;

    if (mode === 'reg') {
        // --- 注文リスト追加モード ---
        const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]');
        const product = products.find(p => (String(p.jan) === String(code) || String(p.id) === String(code)));

        if (product) {
            playBeep('beep3');
            
            // register.htmlと同じ形式でsessionStorageから読み込み
            let orderData = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[], "totalAmount":0, "taxDetails":{}}');
            let items = orderData.items || [];
            
            const existing = items.find(item => item.id === product.id);
            if (existing) {
                existing.qty++;
            } else {
                items.push({ 
                    id: product.id, 
                    name: product.name, 
                    price: Number(product.price), 
                    qty: 1 
                });
            }

            // --- register.htmlのロジックを再現して再計算 ---
            const subtotalByRate = {};
            let finalTaxTotal = 0;
            let finalSubtotal = 0;

            items.forEach(item => {
                // localStorageにある最新の商品マスタから税率を取得
                const pInfo = products.find(p => p.id === item.id);
                const rate = pInfo ? Number(pInfo.taxRate || 0) : 0;
                
                if (!subtotalByRate[rate]) subtotalByRate[rate] = 0;
                subtotalByRate[rate] += (item.price * item.qty);
            });

            Object.keys(subtotalByRate).forEach(rate => {
                const r = Number(rate);
                const sub = subtotalByRate[r];
                finalSubtotal += sub;
                // register.htmlと同じく税率ごとに計算して切り捨て
                finalTaxTotal += Math.floor(sub * (r / 100)); 
            });

            // register.htmlが読み取れる形式で保存
            sessionStorage.setItem('currentOrder', JSON.stringify({ 
                items: items, 
                totalAmount: finalSubtotal + finalTaxTotal,
                taxDetails: subtotalByRate 
            }));

            updateMiniCartUI();
            showPopup(`追加：${product.name}`);
        } else {
            playBeep('beep4');
            showPopup(`未登録の商品です (${code})`, true);
        }
        
        setTimeout(() => { isPaused = false; }, 1500);

    } else {
        // --- JAN登録モード ---
        playBeep('beep3');
        localStorage.setItem('last_scanned_barcode', code);
        showPopup(`コード保存: ${code}`);
        setTimeout(() => history.back(), 1000);
    }
}

function updateMiniCartUI() {
    const list = document.getElementById('cartList');
    const totalArea = document.getElementById('cartTotalArea');
    const totalDisp = document.getElementById('totalAmount');
    const resultPanel = document.querySelector('.result-panel');
    
    if (mode !== 'reg') {
        if (list) list.style.display = 'none';
        if (totalArea) totalArea.style.display = 'none';
        if (resultPanel) resultPanel.style.height = 'auto'; 
        return;
    }

    if (list) {
        list.classList.remove('reg-only');
        list.style.display = 'block';
    }
    if (totalArea) {
        totalArea.classList.remove('reg-only');
        totalArea.style.display = 'block';
    }
    if (resultPanel) resultPanel.style.height = '45vh';

    // SessionStorageからデータを取得（register.htmlと完全に同じキー構造で取得）
    const orderData = JSON.parse(sessionStorage.getItem('currentOrder') || '{"items":[], "totalAmount":0}');
    const items = orderData.items || [];
    
    // リストの描画
    if (items.length > 0) {
        list.innerHTML = items.map(item => {
            // スキャン画面でも税込単価を表示するための簡易計算
            // (正確な計算はhandleScannedCodeで行われているため、ここは表示用)
            return `
                <div class="cart-item">
                    <div class="cart-item-top">
                        <span>${item.name}</span>
                        <span>¥${(item.price * item.qty).toLocaleString()}</span>
                    </div>
                    <div style="font-size:0.75rem;">× ${item.qty}</div>
                </div>
            `;
        }).join('');
    } else {
        list.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">スキャンしてください</div>';
    }
    
    // 合計金額の表示：計算し直すのではなく、保存されている「税込合計」をそのまま出す
    const displayTotal = orderData.totalAmount || 0;
    totalDisp.innerText = `¥${displayTotal.toLocaleString()}`;
    
    list.scrollTop = list.scrollHeight;
}

// ページ読み込み完了時に実行
window.addEventListener('DOMContentLoaded', () => {
    updateMiniCartUI();
});

// 初期表示
if(mode === 'reg') updateMiniCartUI();

</script>
</body>
</html>
